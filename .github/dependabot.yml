version: 2
updates:
  # Less Lately ships as static files (Cloudflare Pages) + a browser bundle — there is
  # no backend. The build/CLI tooling tree (shadcn → @modelcontextprotocol/sdk,
  # vite, wrangler, babel) never reaches production, so we only want update PRs for
  # dependencies that actually ship to the browser.
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    allow:
      - dependency-type: 'production'
    groups:
      production-deps:
        applies-to: version-updates
        dependency-type: 'production'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'

  # Keep the CI/CD workflow actions patched.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
