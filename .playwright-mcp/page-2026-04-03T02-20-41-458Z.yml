                        - code [ref=e300]:
                            - generic [ref=e301]: 'Migrate this project to Vite+. Vite+ replaces the current split tooling around runtime management, package management, dev/build/test commands, linting, formatting, and packaging. Run `vp help` to understand Vite+ capabilities and `vp help migrate` before making changes. Use `vp migrate --no-interactive` in the workspace root. Make sure the project is using Vite 8+ and Vitest 4.1+ before migrating.'
                            - generic [ref=e302]: 'After the migration:'
                            - generic [ref=e303]: '- Confirm `vite` imports were rewritten to `vite-plus` where needed'
                            - generic [ref=e304]: '- Confirm `vitest` imports were rewritten to `vite-plus/test` where needed'
                            - generic [ref=e305]: '- Remove old `vite` and `vitest` dependencies only after those rewrites are confirmed'
                            - generic [ref=e306]: '- Move remaining tool-specific config into the appropriate blocks in `vite.config.ts`'
                            - generic [ref=e307]: 'Command mapping to keep in mind:'
                            - generic [ref=e308]: '- `vp run <script>` is the equivalent of `pnpm run <script>`'
                            - generic [ref=e309]: '- `vp test` runs the built-in test command, while `vp run test` runs the `test` script from `package.json`'
                            - generic [ref=e310]: '- `vp install`, `vp add`, and `vp remove` delegate through the package manager declared by `packageManager`'
                            - generic [ref=e311]: '- `vp dev`, `vp build`, `vp preview`, `vp lint`, `vp fmt`, `vp check`, and `vp pack` replace the corresponding standalone tools'
                            - generic [ref=e312]: '- Prefer `vp check` for validation loops'
                            - generic [ref=e313]: 'Finally, verify the migration by running: `vp install`, `vp check`, `vp test`, and `vp build`'
